<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sono">
<title>Sono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0b;
  --surface: #111113;
  --surface2: #18181c;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6e0;
  --muted: rgba(232,230,224,0.38);
  --accent: #c9a96e;
  --accent2: #7eb8a4;
  --accent3: #9b8ec4;
  --deep: #4a7fa5;
  --rem: #7eb8a4;
  --light: #5a5a6e;
  --red: #c46a5a;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  overflow-x: hidden;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 32px 20px 60px; }

/* HEADER */
header { margin-bottom: 40px; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height: 1;
}
.title span { color: var(--accent); }
.sync-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .05em;
}
.sync-btn:hover { border-color: var(--accent); color: var(--accent); }
.subtitle { font-size: 10px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-top: 6px; }
.last-sync { font-size: 9px; color: var(--muted); opacity: .5; margin-top: 3px; }

/* LOADING */
#loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 60vh; gap: 16px;
}
.loading-ring {
  width: 36px; height: 36px;
  border: 1px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 10px; color: var(--muted); letter-spacing: .1em; }

/* SCORECARDS */
.scores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.score-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  position: relative;
  overflow: hidden;
  animation: fadeUp .4s ease both;
}
.score-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-line, var(--accent)), transparent);
  opacity: .4;
}
.score-label { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.score-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  line-height: 1;
  color: var(--text);
}
.score-value .unit { font-size: 14px; color: var(--muted); margin-left: 3px; }
.score-delta { font-size: 9px; margin-top: 6px; }
.delta-up { color: var(--accent2); }
.delta-down { color: var(--red); }

/* SECTION */
.section { margin-bottom: 24px; animation: fadeUp .4s ease both; }
.section-label {
  font-size: 9px; color: var(--muted);
  letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* CHART CARDS */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 10px;
}
.chart-title { font-size: 10px; color: var(--muted); letter-spacing: .08em; margin-bottom: 16px; text-transform: uppercase; }
.chart-wrap { position: relative; }

/* STAGE BAR */
.stage-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; margin: 8px 0 12px; }
.stage-seg { height: 100%; transition: width .6s ease; }
.stage-legend { display: flex; gap: 16px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--muted); }
.leg-dot { width: 6px; height: 6px; border-radius: 50%; }

/* HEATMAP */
.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.hm-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--surface2);
  position: relative;
}
.hm-day-labels { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
.hm-day-label { font-size: 7px; color: var(--muted); text-align: center; letter-spacing: .04em; }

/* INSIGHT STRIP */
.insight-strip {
  background: linear-gradient(135deg, rgba(201,169,110,.06), rgba(126,184,164,.04));
  border: 1px solid rgba(201,169,110,.15);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 24px;
}
.insight-title { font-size: 9px; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.insight-text { font-size: 11px; color: var(--muted); line-height: 1.7; }
.insight-text strong { color: var(--text); font-weight: 400; }

/* TREND PILLS */
.trend-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.trend-pill {
  font-size: 9px; padding: 4px 10px;
  border-radius: 20px; border: 1px solid var(--border2);
  color: var(--muted); letter-spacing: .04em;
}
.trend-pill.good { border-color: rgba(126,184,164,.3); color: var(--accent2); }
.trend-pill.warn { border-color: rgba(196,106,90,.3); color: var(--red); }
.trend-pill.neutral { border-color: rgba(201,169,110,.3); color: var(--accent); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.section:nth-child(1) { animation-delay: .05s; }
.section:nth-child(2) { animation-delay: .1s; }
.section:nth-child(3) { animation-delay: .15s; }
.section:nth-child(4) { animation-delay: .2s; }
.section:nth-child(5) { animation-delay: .25s; }

canvas { display: block; }

/* ERROR */
#error-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 11px; line-height: 1.8; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="title">sono<span>.</span></div>
      <button class="sync-btn" onclick="loadData()">↻ sincronizar</button>
    </div>
    <div class="subtitle">análise integrativa · fitbit</div>
    <div class="last-sync" id="last-sync">—</div>
  </header>

  <div id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">carregando dados...</div>
  </div>

  <div id="dashboard" style="display:none"></div>
</div>

<script>
const SHEET_ID = '1hPbBeSYai8n_GpzLWLCAb1ny-4shnWlxeS4BAVdMFEc';
const GID = '258378049';
const DIRECT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const URL = `https://corsproxy.io/?${encodeURIComponent(DIRECT)}`;

let rawData = [];

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  try {
    const res = await fetch(URL);
    const text = await res.text();
    rawData = parseCSV(text);
    render(rawData);
    document.getElementById('last-sync').textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div id="error-msg">Não foi possível carregar os dados.<br>Verifique se a planilha está pública.</div>`;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const obj = {};
    headers.forEach((h,i) => {
      obj[h] = (vals[i]||'').replace(/"/g,'').trim();
    });
    return obj;
  }).filter(r => r['Data'] && r['Min Dormido']);
}

function n(v) { return parseFloat(v) || 0; }

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function render(data) {
  // Sort by date
  data.sort((a,b) => new Date(a['Data']) - new Date(b['Data']));
  const last30 = data.slice(-30);
  const last7 = data.slice(-7);
  const prev7 = data.slice(-14,-7);
  const latest = data[data.length-1];

  // Computed
  const avgSleep = avg(last7.map(r=>n(r['Min Dormido'])))/60;
  const prevSleep = avg(prev7.map(r=>n(r['Min Dormido'])))/60;
  const avgEff = avg(last7.map(r=>n(r['Eficiência %'])));
  const prevEff = avg(prev7.map(r=>n(r['Eficiência %'])));
  const avgDeep = avg(last7.map(r=>n(r['Deep (min)'])));
  const avgRem = avg(last7.map(r=>n(r['REM (min)'])));
  const avgLight = avg(last7.map(r=>n(r['Light (min)'])));
  const avgBpm = avg(last7.map(r=>n(r['BPM Repouso'])));
  const prevBpm = avg(prev7.map(r=>n(r['BPM Repouso'])));

  // Deep% and REM% of total sleep
  const avgSleepMin = avg(last7.map(r=>n(r['Min Dormido'])));
  const deepPct = avgSleepMin > 0 ? avgDeep/avgSleepMin*100 : 0;
  const remPct = avgSleepMin > 0 ? avgRem/avgSleepMin*100 : 0;
  const lightPct = avgSleepMin > 0 ? avgLight/avgSleepMin*100 : 0;

  // Insights
  const insights = [];
  if (deepPct < 13) insights.push({text: `Deep em <strong>${deepPct.toFixed(0)}%</strong> — abaixo do ideal (≥13%). Investigar carga inflamatória ou cortisol tardio.`, type:'warn'});
  else insights.push({text: `Deep em <strong>${deepPct.toFixed(0)}%</strong> — dentro da faixa restaurativa.`, type:'good'});
  if (remPct < 20) insights.push({text: `REM em <strong>${remPct.toFixed(0)}%</strong> — abaixo do ideal (≥20%). Suporte ao processamento emocional recomendado.`, type:'warn'});
  else insights.push({text: `REM em <strong>${remPct.toFixed(0)}%</strong> — consolidação emocional adequada.`, type:'good'});
  if (avgBpm > 60) insights.push({text: `BPM de repouso elevado (<strong>${avgBpm.toFixed(0)} bpm</strong>) pode indicar dominância simpática.`, type:'warn'});

  // HTML START
  const d = document.getElementById('dashboard');
  d.innerHTML = '';

  // SCORECARDS
  const scores = document.createElement('div');
  scores.className = 'scores';
  scores.innerHTML = `
    ${scoreCard('sono médio', avgSleep.toFixed(1), 'h', delta(avgSleep, prevSleep, true), '#c9a96e')}
    ${scoreCard('eficiência', avgEff.toFixed(0), '%', delta(avgEff, prevEff, true), '#7eb8a4')}
    ${scoreCard('deep sleep', avgDeep.toFixed(0), 'min', deepPct.toFixed(0)+'% do total', '#4a7fa5')}
    ${scoreCard('bpm repouso', avgBpm.toFixed(0), '', delta(avgBpm, prevBpm, false), '#9b8ec4')}
  `;
  d.appendChild(scores);

  // TREND PILLS
  const trendRow = document.createElement('div');
  trendRow.className = 'trend-row';
  trendRow.innerHTML = insights.map(i =>
    `<span class="trend-pill ${i.type}">${i.text.replace(/<[^>]+>/g,'')}</span>`
  ).join('');
  d.appendChild(trendRow);

  // INSIGHT
  if (insights.length > 0) {
    const ins = document.createElement('div');
    ins.className = 'insight-strip';
    ins.innerHTML = `<div class="insight-title">análise integrativa · 7 dias</div><div class="insight-text">${insights.map(i=>i.text).join('<br><br>')}</div>`;
    d.appendChild(ins);
  }

  // SECTION 1 — Arquitetura do sono
  const s1 = section('arquitetura do sono');

  // Stage composition bar (last night)
  const latDeep = n(latest['Deep (min)']);
  const latRem = n(latest['REM (min)']);
  const latLight = n(latest['Light (min)']);
  const latTotal = latDeep + latRem + latLight || 1;
  s1.innerHTML += `
    <div class="chart-card">
      <div class="chart-title">composição da noite passada</div>
      <div class="stage-bar">
        <div class="stage-seg" style="width:${latDeep/latTotal*100}%;background:var(--deep)"></div>
        <div class="stage-seg" style="width:${latRem/latTotal*100}%;background:var(--rem)"></div>
        <div class="stage-seg" style="width:${latLight/latTotal*100}%;background:var(--light)"></div>
      </div>
      <div class="stage-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--deep)"></div>deep ${latDeep}min</div>
        <div class="leg"><div class="leg-dot" style="background:var(--rem)"></div>rem ${latRem}min</div>
        <div class="leg"><div class="leg-dot" style="background:var(--light)"></div>light ${latLight}min</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">estágios — 30 dias (min)</div>
      <div class="chart-wrap"><canvas id="c-stages" height="160"></canvas></div>
    </div>
  `;
  d.appendChild(s1);

  // SECTION 2 — Qualidade
  const s2 = section('qualidade & recuperação');
  s2.innerHTML += `
    <div class="chart-card">
      <div class="chart-title">eficiência do sono — 30 dias</div>
      <div class="chart-wrap"><canvas id="c-eff" height="130"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">bpm repouso — 30 dias</div>
      <div class="chart-wrap"><canvas id="c-bpm" height="130"></canvas></div>
    </div>
  `;
  d.appendChild(s2);

  // SECTION 3 — Circadiano
  const s3 = section('ritmo circadiano');
  s3.innerHTML += `
    <div class="chart-card">
      <div class="chart-title">horário de início do sono</div>
      <div class="chart-wrap"><canvas id="c-circ" height="130"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">duração total — 30 dias (min)</div>
      <div class="chart-wrap"><canvas id="c-dur" height="130"></canvas></div>
    </div>
  `;
  d.appendChild(s3);

  // SECTION 4 — Heatmap
  const s4 = section('mapa de eficiência');
  const hmDiv = document.createElement('div');
  hmDiv.className = 'chart-card';
  hmDiv.innerHTML = `<div class="chart-title">eficiência diária — últimos 60 dias</div><div id="heatmap"></div>`;
  s4.appendChild(hmDiv);
  d.appendChild(s4);

  // SECTION 5 — Scatter
  const s5 = section('correlações');
  s5.innerHTML += `
    <div class="chart-card">
      <div class="chart-title">eficiência × bpm repouso</div>
      <div class="chart-wrap"><canvas id="c-scatter" height="160"></canvas></div>
    </div>
  `;
  d.appendChild(s5);

  document.getElementById('loading').style.display = 'none';
  d.style.display = 'block';

  // NOW DRAW CHARTS
  const dates30 = last30.map(r => {
    const d = r['Data'];
    const parts = d.split('-');
    return `${parts[2]}/${parts[1]}`;
  });

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600 },
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#18181c',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
      titleColor: '#e8e6e0',
      bodyColor: 'rgba(232,230,224,0.6)',
      titleFont: { family: 'DM Mono', size: 10 },
      bodyFont: { family: 'DM Mono', size: 9 },
      padding: 10,
    }},
    scales: {
      x: {
        grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
        ticks: { color: 'rgba(232,230,224,0.3)', font: { family:'DM Mono', size:8 }, maxTicksLimit: 6, maxRotation: 0 },
        border: { display: false }
      },
      y: {
        grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
        ticks: { color: 'rgba(232,230,224,0.3)', font: { family:'DM Mono', size:8 }, maxTicksLimit: 4 },
        border: { display: false }
      }
    }
  };

  // STAGES CHART
  new Chart(document.getElementById('c-stages'), {
    type: 'bar',
    data: {
      labels: dates30,
      datasets: [
        { label:'Deep', data: last30.map(r=>n(r['Deep (min)'])), backgroundColor:'rgba(74,127,165,0.8)', stack:'s' },
        { label:'REM',  data: last30.map(r=>n(r['REM (min)'])),  backgroundColor:'rgba(126,184,164,0.8)', stack:'s' },
        { label:'Light',data: last30.map(r=>n(r['Light (min)'])),backgroundColor:'rgba(90,90,110,0.6)', stack:'s' },
      ]
    },
    options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, legend: { display:true, labels:{ color:'rgba(232,230,224,0.4)', font:{family:'DM Mono',size:8}, boxWidth:6, boxHeight:6, padding:12 } } } }
  });

  // EFFICIENCY
  new Chart(document.getElementById('c-eff'), {
    type: 'line',
    data: {
      labels: dates30,
      datasets: [{
        data: last30.map(r=>n(r['Eficiência %'])),
        borderColor: '#7eb8a4',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        backgroundColor: 'rgba(126,184,164,0.06)',
        tension: 0.4
      }]
    },
    options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, min:70, max:100 } } }
  });

  // BPM
  new Chart(document.getElementById('c-bpm'), {
    type: 'line',
    data: {
      labels: dates30,
      datasets: [{
        data: last30.map(r=>n(r['BPM Repouso'])),
        borderColor: '#9b8ec4',
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        backgroundColor: 'rgba(155,142,196,0.06)',
        tension: 0.4
      }]
    },
    options: chartDefaults
  });

  // CIRCADIAN — extract hour from Inicio
  const circHours = last30.map(r => {
    const t = r['Início'] || r['Inicio'] || '';
    const match = t.match(/T(\d+):/);
    if (match) {
      let h = parseInt(match[1]);
      // Normalize: if h < 12, treat as next-day (e.g. 1am = 25)
      if (h < 12) h += 24;
      return h;
    }
    return null;
  }).filter(h => h !== null);

  new Chart(document.getElementById('c-circ'), {
    type: 'line',
    data: {
      labels: dates30.slice(-circHours.length),
      datasets: [{
        data: circHours,
        borderColor: '#c9a96e',
        borderWidth: 1.5,
        pointRadius: 2,
        pointBackgroundColor: '#c9a96e',
        pointHoverRadius: 4,
        fill: false,
        tension: 0.3
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: {
          ...chartDefaults.scales.y,
          min: 20, max: 27,
          ticks: {
            ...chartDefaults.scales.y.ticks,
            callback: v => {
              const h = v > 23 ? v - 24 : v;
              return h + 'h';
            }
          }
        }
      }
    }
  });

  // DURATION
  new Chart(document.getElementById('c-dur'), {
    type: 'bar',
    data: {
      labels: dates30,
      datasets: [{
        data: last30.map(r=>n(r['Min Dormido'])),
        backgroundColor: last30.map(r => n(r['Min Dormido']) >= 420 ? 'rgba(126,184,164,0.7)' : 'rgba(196,106,90,0.6)'),
        borderRadius: 3,
        borderSkipped: false,
      }]
    },
    options: {
      ...chartDefaults,
      plugins: { ...chartDefaults.plugins, annotation: {} }
    }
  });

  // HEATMAP
  buildHeatmap(data.slice(-60));

  // SCATTER
  new Chart(document.getElementById('c-scatter'), {
    type: 'scatter',
    data: {
      datasets: [{
        data: last30.map(r => ({ x: n(r['BPM Repouso']), y: n(r['Eficiência %']) })),
        backgroundColor: 'rgba(201,169,110,0.5)',
        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        x: { ...chartDefaults.scales.x, title: { display:true, text:'BPM', color:'rgba(232,230,224,0.2)', font:{family:'DM Mono',size:8} } },
        y: { ...chartDefaults.scales.y, title: { display:true, text:'Eficiência %', color:'rgba(232,230,224,0.2)', font:{family:'DM Mono',size:8} }, min:70, max:100 }
      }
    }
  });
}

function buildHeatmap(data) {
  const hm = document.getElementById('heatmap');
  const days = ['D','S','T','Q','Q','S','S'];
  const dayLabels = document.createElement('div');
  dayLabels.className = 'hm-day-labels';
  days.forEach(d => { dayLabels.innerHTML += `<div class="hm-day-label">${d}</div>`; });
  hm.appendChild(dayLabels);

  const grid = document.createElement('div');
  grid.className = 'heatmap';

  // Find first Sunday before or on first date
  const firstDate = new Date(data[0]['Data']);
  const dayOfWeek = firstDate.getDay();
  const startDate = new Date(firstDate);
  startDate.setDate(startDate.getDate() - dayOfWeek);

  const lastDate = new Date(data[data.length-1]['Data']);
  const map = {};
  data.forEach(r => { map[r['Data']] = n(r['Eficiência %']); });

  let cur = new Date(startDate);
  while (cur <= lastDate) {
    const key = cur.toISOString().split('T')[0];
    const val = map[key];
    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    if (val !== undefined) {
      const norm = Math.max(0, Math.min(1, (val - 70) / 30));
      if (norm > 0.6) cell.style.background = `rgba(126,184,164,${0.3 + norm*0.7})`;
      else if (norm > 0.3) cell.style.background = `rgba(201,169,110,${0.3 + norm*0.5})`;
      else cell.style.background = `rgba(196,106,90,${0.3 + (1-norm)*0.4})`;
      cell.title = `${key}: ${val}%`;
    }
    grid.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }
  hm.appendChild(grid);
}

function section(label) {
  const s = document.createElement('div');
  s.className = 'section';
  s.innerHTML = `<div class="section-label">${label}</div>`;
  return s;
}

function scoreCard(label, value, unit, sub, color) {
  return `<div class="score-card" style="--accent-line:${color}">
    <div class="score-label">${label}</div>
    <div class="score-value">${value}<span class="unit">${unit}</span></div>
    <div class="score-delta" style="color:${color};opacity:.7;font-size:9px">${sub}</div>
  </div>`;
}

function delta(cur, prev, higherGood) {
  if (!prev) return '—';
  const d = cur - prev;
  const pct = Math.abs(d/prev*100).toFixed(0);
  const up = d >= 0;
  const good = higherGood ? up : !up;
  const arrow = up ? '↑' : '↓';
  return `<span class="${good?'delta-up':'delta-down'}">${arrow} ${pct}% vs semana anterior</span>`;
}

loadData();
