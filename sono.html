<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sono">
<title>Sono</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a0b;--surface:#111113;--surface2:#18181c;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8e6e0;--muted:rgba(232,230,224,0.38);
  --accent:#c9a96e;--accent2:#7eb8a4;--accent3:#9b8ec4;
  --deep:#4a7fa5;--rem:#7eb8a4;--ls:#5a5a6e;--red:#c46a5a;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-weight:300;min-height:100vh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}
.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:32px 18px 80px;}

header{margin-bottom:28px;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;letter-spacing:-.02em;line-height:1;}
.title span{color:var(--accent);}
.sync-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .2s;letter-spacing:.06em;}
.sync-btn:hover{border-color:var(--accent);color:var(--accent);}
.subtitle{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:5px;}
.last-sync{font-size:9px;color:var(--muted);opacity:.4;margin-top:3px;}

.period-tabs{display:flex;gap:5px;margin-bottom:24px;overflow-x:auto;padding-bottom:2px;}
.period-tabs::-webkit-scrollbar{display:none;}
.tab{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s;letter-spacing:.05em;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0a0b;font-weight:400;}
.tab:hover:not(.active){color:var(--text);}

#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;}
.ring{width:30px;height:30px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-size:9px;color:var(--muted);letter-spacing:.1em;}

.scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--lc,var(--accent)),transparent);opacity:.5;}
.sl{font-size:8px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.sv{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:300;line-height:1;}
.su{font-size:12px;color:var(--muted);margin-left:2px;}
.sd{font-size:8px;margin-top:5px;color:var(--muted);}
.up{color:var(--accent2);}.down{color:var(--red);}

.section{margin-bottom:18px;animation:fadeUp .35s ease both;}
.sl2{font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.sl2::after{content:'';flex:1;height:1px;background:var(--border);}

.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:8px;}
.ct{font-size:8px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px;}
canvas{display:block;}

.stage-bar{height:6px;border-radius:3px;overflow:hidden;display:flex;margin:6px 0 10px;}
.stage-seg{height:100%;}
.stage-legend{display:flex;gap:12px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);}
.ld{width:5px;height:5px;border-radius:50%;}

.hm-day-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.hm-day-label{font-size:7px;color:var(--muted);text-align:center;}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.hm-cell{aspect-ratio:1;border-radius:2px;background:var(--surface2);}

.ins{background:linear-gradient(135deg,rgba(201,169,110,.05),rgba(126,184,164,.03));border:1px solid rgba(201,169,110,.12);border-radius:var(--r);padding:14px 15px;margin-bottom:18px;}
.ins-title{font-size:8px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.ins-text{font-size:11px;color:var(--muted);line-height:1.75;}
.ins-text strong{color:var(--text);font-weight:400;}

.mt{width:100%;border-collapse:collapse;font-size:9px;}
.mt th{color:var(--muted);font-weight:300;letter-spacing:.07em;text-transform:uppercase;padding:5px 7px;text-align:right;border-bottom:1px solid var(--border);}
.mt th:first-child{text-align:left;}
.mt td{padding:6px 7px;text-align:right;border-bottom:1px solid var(--border);color:var(--text);}
.mt td:first-child{text-align:left;color:var(--muted);}
.mt tr:last-child td{border-bottom:none;}
.gc{color:var(--accent2)!important;}.bc{color:var(--red)!important;}.nc{color:var(--accent)!important;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="title">sono<span>.</span></div>
      <button class="sync-btn" onclick="loadData()">↻ sync</button>
    </div>
    <div class="subtitle">análise integrativa · fitbit</div>
    <div class="last-sync" id="ls">—</div>
  </header>
  <div id="loading"><div class="ring"></div><div class="lt">carregando...</div></div>
  <div id="main" style="display:none">
    <div class="period-tabs" id="tabs"></div>
    <div id="dash"></div>
  </div>
</div>
<script>
const SID='1hPbBeSYai8n_GpzLWLCAb1ny-4shnWlxeS4BAVdMFEc', GID='258378049';
const URL=`https://corsproxy.io/?${encodeURIComponent(`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${GID}`)}`;
let ALL=[], CUR='30d', CHARTS=[];

const n=v=>parseFloat(v)||0;
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
function minToH(m){if(m<60)return Math.round(m)+'min';const h=Math.floor(m/60),mm=Math.round(m%60);return mm?`${h}h${String(mm).padStart(2,'0')}`:`${h}h`;}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm?`${hh}h${String(mm).padStart(2,'0')}`:`${hh}h`;}
function dlt(c,p,hi){if(!p)return'—';const d=c-p,pct=Math.abs(d/p*100).toFixed(0),up=d>=0,good=hi?up:!up;return`<span class="${good?'up':'down'}">${up?'↑':'↓'}${pct}% vs anterior</span>`;}
function mKey(ds){const d=new Date(ds);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function mLabel(k){const[y,m]=k.split('-');return['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][+m-1]+' '+y.slice(2);}
function qKey(ds){const d=new Date(ds);return`${d.getFullYear()} Q${Math.floor(d.getMonth()/3)+1}`;}

function parseCSV(t){
  const rows=t.trim().split('\n');
  const hdr=rows[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return rows.slice(1).map(row=>{
    const v=[];let cur='',q=false;
    for(const c of row){if(c==='"'){q=!q;}else if(c===','&&!q){v.push(cur);cur='';}else cur+=c;}
    v.push(cur);
    const o={};hdr.forEach((h,i)=>o[h]=(v[i]||'').replace(/"/g,'').trim());
    return o;
  }).filter(r=>r['Data']&&n(r['Min Dormido'])>60);
}

async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('main').style.display='none';
  try{
    const r=await fetch(URL);
    const t=await r.text();
    ALL=parseCSV(t).sort((a,b)=>new Date(a['Data'])-new Date(b['Data']));
    buildTabs();render(CUR);
    document.getElementById('ls').textContent='atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
  }catch(e){document.getElementById('loading').innerHTML=`<div style="text-align:center;color:var(--muted);font-size:11px;line-height:2">Erro ao carregar.<br>${e.message}</div>`;}
}

const PERIODS=[{id:'7d',l:'7 dias'},{id:'30d',l:'30 dias'},{id:'90d',l:'90 dias'},{id:'6m',l:'6 meses'},{id:'1y',l:'1 ano'},{id:'all',l:'tudo'},{id:'monthly',l:'por mês'},{id:'quarterly',l:'por quarter'}];
function buildTabs(){document.getElementById('tabs').innerHTML=PERIODS.map(p=>`<button class="tab${p.id===CUR?' active':''}" onclick="sw('${p.id}')">${p.l}</button>`).join('');}
function sw(p){CUR=p;buildTabs();render(p);}

function fd(p){
  const last=new Date(ALL[ALL.length-1]['Data']);
  if(p==='7d')  return ALL.filter(r=>new Date(r['Data'])>=new Date(last-7*864e5));
  if(p==='30d') return ALL.filter(r=>new Date(r['Data'])>=new Date(last-30*864e5));
  if(p==='90d') return ALL.filter(r=>new Date(r['Data'])>=new Date(last-90*864e5));
  if(p==='6m')  return ALL.filter(r=>new Date(r['Data'])>=new Date(last-183*864e5));
  if(p==='1y')  return ALL.filter(r=>new Date(r['Data'])>=new Date(last-365*864e5));
  return ALL;
}

function dc(extra={}){
  return{responsive:true,maintainAspectRatio:false,animation:{duration:450},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#18181c',borderColor:'rgba(255,255,255,.07)',borderWidth:1,titleColor:'#e8e6e0',bodyColor:'rgba(232,230,224,.5)',padding:10,titleFont:{family:'DM Mono',size:9},bodyFont:{family:'DM Mono',size:8}},...(extra.plugins||{})},
    scales:{x:{grid:{color:'rgba(255,255,255,.025)'},border:{display:false},ticks:{color:'rgba(232,230,224,.22)',font:{family:'DM Mono',size:7},maxTicksLimit:8,maxRotation:0}},y:{grid:{color:'rgba(255,255,255,.025)'},border:{display:false},ticks:{color:'rgba(232,230,224,.22)',font:{family:'DM Mono',size:7},maxTicksLimit:4}}},...extra};
}
const LEGO={display:true,labels:{color:'rgba(232,230,224,.3)',font:{family:'DM Mono',size:7},boxWidth:5,boxHeight:5,padding:10}};

function destroyAll(){CHARTS.forEach(c=>c.destroy());CHARTS=[];}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function sec(lbl){const s=el('div','section');s.innerHTML=`<div class="sl2">${lbl}</div>`;return s;}
function ccard(parent,title,h,cb){
  const id='c'+Math.random().toString(36).slice(2,8);
  const c=el('div','cc');
  c.innerHTML=`<div class="ct">${title}</div><div style="position:relative;height:${h}px"><canvas id="${c.id=id}"></canvas></div>`;
  parent.appendChild(c);
  requestAnimationFrame(()=>cb(id));
}
function scard(lbl,val,unit,sub,color){return`<div class="sc" style="--lc:${color}"><div class="sl">${lbl}</div><div class="sv">${val}${unit?`<span class="su">${unit}</span>`:''}</div><div class="sd">${sub}</div></div>`;}

function render(p){
  destroyAll();
  const d=document.getElementById('dash');d.innerHTML='';
  if(p==='monthly'||p==='quarterly') return renderAgg(d,p);
  const data=fd(p);
  if(!data.length){d.innerHTML='<div style="color:var(--muted);font-size:11px;padding:20px 0">Sem dados.</div>';return;}

  const half=Math.floor(data.length/2);
  const c=data.slice(half),pr=data.slice(0,half);
  const G=field=>avg(c.map(r=>n(r[field])).filter(x=>x>0));
  const Gp=field=>avg(pr.map(r=>n(r[field])).filter(x=>x>0));

  const aS=G('Min Dormido')/60,pS=Gp('Min Dormido')/60;
  const aE=G('Eficiência %'),pE=Gp('Eficiência %');
  const aB=G('BPM Repouso'),pB=Gp('BPM Repouso');
  const aA=G('Min Acordado'),pA=Gp('Min Acordado');
  const aD=G('Deep (min)'),aR=G('REM (min)');
  const aM=G('Min Dormido');
  const dPct=aM?aD/aM*100:0, rPct=aM?aR/aM*100:0;

  // SCORES
  const sc=el('div','scores');
  sc.innerHTML=scard('sono médio',fmtH(aS),'',dlt(aS,pS,true),'#c9a96e')+
               scard('eficiência',aE.toFixed(0),'%',dlt(aE,pE,true),'#7eb8a4')+
               scard('bpm repouso',aB.toFixed(0),'bpm',dlt(aB,pB,false),'#9b8ec4')+
               scard('acordado',minToH(aA),'',dlt(aA,pA,false),'#c46a5a');
  d.appendChild(sc);

  // INSIGHT
  const ins=[];
  if(dPct<13) ins.push(`Deep em <strong>${dPct.toFixed(0)}%</strong> — abaixo do ideal ≥13%. Investigar cortisol tardio ou inflamação.`);
  else ins.push(`Deep em <strong>${dPct.toFixed(0)}%</strong> — faixa restaurativa adequada.`);
  if(rPct<20) ins.push(`REM em <strong>${rPct.toFixed(0)}%</strong> — abaixo do ideal ≥20%.`);
  else ins.push(`REM em <strong>${rPct.toFixed(0)}%</strong> — consolidação emocional ok.`);
  if(aB>58) ins.push(`BPM médio de <strong>${aB.toFixed(0)}</strong> — avalie dominância simpática.`);
  if(aA>45) ins.push(`Acordado <strong>${minToH(aA)}</strong>/noite em média — fragmentação elevada.`);
  const ie=el('div','ins');
  ie.innerHTML=`<div class="ins-title">análise integrativa</div><div class="ins-text">${ins.join('<br>')}</div>`;
  d.appendChild(ie);

  const long=data.length>60;
  const labels=data.map(r=>{const dt=new Date(r['Data']);return`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;});

  // DURAÇÃO
  const s1=sec('duração do sono');
  // last night
  const lat=data[data.length-1];
  const ld=n(lat['Deep (min)']),lr=n(lat['REM (min)']),ll=n(lat['Light (min)']),lt2=ld+lr+ll||1;
  const nb=el('div','cc');
  nb.innerHTML=`<div class="ct">última noite — ${minToH(n(lat['Min Dormido']))} dormidos · ${minToH(n(lat['Min Acordado']))} acordado</div>
    <div class="stage-bar">
      <div class="stage-seg" style="width:${ld/lt2*100}%;background:var(--deep)"></div>
      <div class="stage-seg" style="width:${lr/lt2*100}%;background:var(--rem)"></div>
      <div class="stage-seg" style="width:${ll/lt2*100}%;background:var(--ls)"></div>
    </div>
    <div class="stage-legend">
      <div class="leg"><div class="ld" style="background:var(--deep)"></div>deep ${minToH(ld)} (${(ld/lt2*100).toFixed(0)}%)</div>
      <div class="leg"><div class="ld" style="background:var(--rem)"></div>rem ${minToH(lr)} (${(lr/lt2*100).toFixed(0)}%)</div>
      <div class="leg"><div class="ld" style="background:var(--ls)"></div>light ${minToH(ll)} (${(ll/lt2*100).toFixed(0)}%)</div>
    </div>`;
  s1.appendChild(nb);
  ccard(s1,'sono dormido × acordado (h)',175,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'bar',
      data:{labels,datasets:[
        {label:'Dormido',data:data.map(r=>+(n(r['Min Dormido'])/60).toFixed(2)),backgroundColor:'rgba(126,184,164,.72)',stack:'s',borderRadius:2,borderSkipped:false},
        {label:'Acordado',data:data.map(r=>+(n(r['Min Acordado'])/60).toFixed(2)),backgroundColor:'rgba(196,106,90,.5)',stack:'s',borderRadius:2,borderSkipped:false},
      ]},
      options:{...dc({plugins:{legend:LEGO}}),scales:{...dc().scales,y:{...dc().scales.y,ticks:{...dc().scales.y.ticks,callback:v=>v+'h'}}}}
    }));
  });
  d.appendChild(s1);

  // EFICIÊNCIA
  const s2=sec('qualidade & eficiência');
  ccard(s2,'eficiência do sono (%)',125,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[{data:data.map(r=>n(r['Eficiência %'])),borderColor:'#7eb8a4',borderWidth:1.5,pointRadius:0,pointHoverRadius:3,fill:true,backgroundColor:'rgba(126,184,164,.05)',tension:.4}]},
      options:{...dc(),scales:{...dc().scales,y:{...dc().scales.y,min:70,max:100,ticks:{...dc().scales.y.ticks,callback:v=>v+'%'}}}}
    }));
  });
  d.appendChild(s2);

  // ESTÁGIOS
  const s3=sec('arquitetura do sono');
  ccard(s3,'deep · rem · light (h)',165,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'bar',
      data:{labels,datasets:[
        {label:'Deep',data:data.map(r=>+(n(r['Deep (min)'])/60).toFixed(2)),backgroundColor:'rgba(74,127,165,.85)',stack:'s',borderRadius:2,borderSkipped:false},
        {label:'REM', data:data.map(r=>+(n(r['REM (min)'])/60).toFixed(2)), backgroundColor:'rgba(126,184,164,.85)',stack:'s',borderRadius:2,borderSkipped:false},
        {label:'Light',data:data.map(r=>+(n(r['Light (min)'])/60).toFixed(2)),backgroundColor:'rgba(90,90,110,.55)',stack:'s',borderRadius:2,borderSkipped:false},
      ]},
      options:{...dc({plugins:{legend:LEGO}}),scales:{...dc().scales,y:{...dc().scales.y,ticks:{...dc().scales.y.ticks,callback:v=>v+'h'}}}}
    }));
  });
  d.appendChild(s3);

  // BPM
  const s4=sec('bpm de repouso');
  ccard(s4,'bpm repouso',125,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[{data:data.map(r=>n(r['BPM Repouso'])||null),borderColor:'#9b8ec4',borderWidth:1.5,pointRadius:0,pointHoverRadius:3,fill:true,backgroundColor:'rgba(155,142,196,.05)',tension:.4,spanGaps:true}]},
      options:dc()
    }));
  });
  d.appendChild(s4);

  // CIRCADIANO
  const s5=sec('ritmo circadiano');
  ccard(s5,'horário de início do sono',125,id=>{
    const circ=data.map(r=>{
      const t=r['Início']||r['Inicio']||'';const m=t.match(/T(\d+):(\d+)/);
      if(!m)return null;let h=+m[1],mm=+m[2];if(h<12)h+=24;return+(h+mm/60).toFixed(2);
    });
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[{data:circ,borderColor:'#c9a96e',borderWidth:1.5,pointRadius:circ.length<50?2:0,pointBackgroundColor:'#c9a96e',pointHoverRadius:3,fill:false,tension:.3,spanGaps:true}]},
      options:{...dc(),scales:{...dc().scales,y:{...dc().scales.y,min:19,max:27,
        ticks:{...dc().scales.y.ticks,callback:v=>{const h=v>23?v-24:v;return`${Math.floor(h)}h${String(Math.round((h%1)*60)).padStart(2,'0')}`}}}}}
    }));
  });
  d.appendChild(s5);

  // SCATTER BPM x Eficiência
  const s6=sec('correlações');
  ccard(s6,'eficiência × bpm repouso',155,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'scatter',
      data:{datasets:[{data:data.map(r=>({x:n(r['BPM Repouso']),y:n(r['Eficiência %'])})).filter(p=>p.x>0&&p.y>0),backgroundColor:'rgba(201,169,110,.45)',pointRadius:4,pointHoverRadius:6}]},
      options:{...dc(),scales:{
        x:{...dc().scales.x,title:{display:true,text:'bpm',color:'rgba(232,230,224,.2)',font:{family:'DM Mono',size:7}}},
        y:{...dc().scales.y,min:70,max:100,title:{display:true,text:'eficiência %',color:'rgba(232,230,224,.2)',font:{family:'DM Mono',size:7}}}
      }}
    }));
  });
  d.appendChild(s6);

  // HEATMAP
  const s7=sec('mapa de eficiência');
  const hc=el('div','cc');hc.innerHTML='<div class="ct">eficiência diária</div><div id="hm"></div>';
  s7.appendChild(hc);d.appendChild(s7);
  buildHM(data,'hm');
}

function renderAgg(d,mode){
  const grp={};
  ALL.forEach(r=>{const k=mode==='monthly'?mKey(r['Data']):qKey(r['Data']);(grp[k]=grp[k]||[]).push(r);});
  const keys=Object.keys(grp).sort();
  const labels=keys.map(k=>mode==='monthly'?mLabel(k):k);
  const G=(k,f)=>avg(grp[k].map(r=>n(r[f])).filter(x=>x>0));

  const sH=keys.map(k=>+(G(k,'Min Dormido')/60).toFixed(2));
  const aH=keys.map(k=>+(G(k,'Min Acordado')/60).toFixed(2));
  const eff=keys.map(k=>+G(k,'Eficiência %').toFixed(1));
  const deep=keys.map(k=>+(G(k,'Deep (min)')/60).toFixed(2));
  const rem=keys.map(k=>+(G(k,'REM (min)')/60).toFixed(2));
  const light=keys.map(k=>+(G(k,'Light (min)')/60).toFixed(2));
  const bpm=keys.map(k=>+G(k,'BPM Repouso').toFixed(1));
  const dPct=keys.map((k,i)=>sH[i]>0?+(deep[i]/sH[i]*100).toFixed(1):0);
  const rPct=keys.map((k,i)=>sH[i]>0?+(rem[i]/sH[i]*100).toFixed(1):0);

  // TABLE
  const s0=sec(mode==='monthly'?'resumo por mês':'resumo por quarter');
  const tc=el('div','cc');
  tc.innerHTML=`<div class="ct">médias consolidadas</div><div style="overflow-x:auto">
    <table class="mt"><thead><tr><th>período</th><th>sono</th><th>efic</th><th>deep%</th><th>rem%</th><th>bpm</th><th>acordado</th></tr></thead>
    <tbody>${keys.map((k,i)=>`<tr>
      <td>${labels[i]}</td>
      <td class="${sH[i]>=7?'gc':sH[i]<6?'bc':''}">${fmtH(sH[i])}</td>
      <td class="${eff[i]>=90?'gc':eff[i]<85?'bc':''}">${eff[i]}%</td>
      <td class="${dPct[i]>=13?'gc':dPct[i]<10?'bc':'nc'}">${dPct[i]}%</td>
      <td class="${rPct[i]>=20?'gc':rPct[i]<15?'bc':'nc'}">${rPct[i]}%</td>
      <td class="${bpm[i]&&bpm[i]<=55?'gc':bpm[i]>62?'bc':''}">${bpm[i]||'—'}</td>
      <td class="${aH[i]<0.5?'gc':aH[i]>1?'bc':''}">${fmtH(aH[i])}</td>
    </tr>`).join('')}</tbody></table></div>`;
  s0.appendChild(tc);d.appendChild(s0);

  const s1=sec('duração média');
  ccard(s1,'sono dormido × acordado (h)',175,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'bar',
      data:{labels,datasets:[
        {label:'Dormido',data:sH,backgroundColor:'rgba(126,184,164,.72)',stack:'s',borderRadius:3,borderSkipped:false},
        {label:'Acordado',data:aH,backgroundColor:'rgba(196,106,90,.5)',stack:'s',borderRadius:3,borderSkipped:false},
      ]},
      options:{...dc({plugins:{legend:LEGO}}),scales:{...dc().scales,y:{...dc().scales.y,ticks:{...dc().scales.y.ticks,callback:v=>v+'h'}}}}
    }));
  });
  d.appendChild(s1);

  const s2=sec('arquitetura média');
  ccard(s2,'deep · rem · light (h)',165,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'bar',
      data:{labels,datasets:[
        {label:'Deep', data:deep, backgroundColor:'rgba(74,127,165,.85)',stack:'s',borderRadius:3,borderSkipped:false},
        {label:'REM',  data:rem,  backgroundColor:'rgba(126,184,164,.85)',stack:'s',borderRadius:3,borderSkipped:false},
        {label:'Light',data:light,backgroundColor:'rgba(90,90,110,.55)',stack:'s',borderRadius:3,borderSkipped:false},
      ]},
      options:{...dc({plugins:{legend:LEGO}}),scales:{...dc().scales,y:{...dc().scales.y,ticks:{...dc().scales.y.ticks,callback:v=>v+'h'}}}}
    }));
  });
  d.appendChild(s2);

  const s3=sec('qualidade dos estágios (%)');
  ccard(s3,'deep% e rem% do sono total',140,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[
        {label:'Deep%',data:dPct,borderColor:'#4a7fa5',borderWidth:2,pointRadius:3,pointBackgroundColor:'#4a7fa5',fill:false,tension:.3},
        {label:'REM%', data:rPct, borderColor:'#7eb8a4',borderWidth:2,pointRadius:3,pointBackgroundColor:'#7eb8a4',fill:false,tension:.3},
      ]},
      options:{...dc({plugins:{legend:LEGO}}),scales:{...dc().scales,y:{...dc().scales.y,ticks:{...dc().scales.y.ticks,callback:v=>v+'%'}}}}
    }));
  });
  d.appendChild(s3);

  const s4=sec('bpm de repouso');
  ccard(s4,'bpm médio por período',130,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[{data:bpm,borderColor:'#9b8ec4',borderWidth:2,pointRadius:4,pointBackgroundColor:'#9b8ec4',fill:true,backgroundColor:'rgba(155,142,196,.06)',tension:.3}]},
      options:dc()
    }));
  });
  d.appendChild(s4);

  const s5=sec('eficiência');
  ccard(s5,'eficiência média (%)',130,id=>{
    CHARTS.push(new Chart(document.getElementById(id),{type:'line',
      data:{labels,datasets:[{data:eff,borderColor:'#7eb8a4',borderWidth:2,pointRadius:4,pointBackgroundColor:'#7eb8a4',fill:true,backgroundColor:'rgba(126,184,164,.06)',tension:.3}]},
      options:{...dc(),scales:{...dc().scales,y:{...dc().scales.y,min:75,max:100,ticks:{...dc().scales.y.ticks,callback:v=>v+'%'}}}}
    }));
  });
  d.appendChild(s5);
}

function buildHM(data,containerId){
  const wrap=document.getElementById(containerId);if(!wrap)return;
  const dl=el('div','hm-day-labels');
  ['D','S','T','Q','Q','S','S'].forEach(d=>{const s=el('div','hm-day-label');s.textContent=d;dl.appendChild(s);});
  wrap.appendChild(dl);
  const grid=el('div','heatmap');
  const map={};data.forEach(r=>{map[r['Data']]=n(r['Eficiência %']);});
  const first=new Date(data[0]['Data']);first.setDate(first.getDate()-first.getDay());
  const last=new Date(data[data.length-1]['Data']);
  let cur=new Date(first);
  while(cur<=last){
    const key=cur.toISOString().split('T')[0],val=map[key];
    const cell=el('div','hm-cell');
    if(val!==undefined){
      const norm=Math.max(0,Math.min(1,(val-70)/30));
      cell.style.background=norm>0.6?`rgba(126,184,164,${.25+norm*.75})`:norm>0.3?`rgba(201,169,110,${.25+norm*.5})`:`rgba(196,106,90,${.3+(1-norm)*.4})`;
      cell.title=`${key}: ${val}%`;
    }
    grid.appendChild(cell);cur.setDate(cur.getDate()+1);
  }
  wrap.appendChild(grid);
}

loadData();
</script>
