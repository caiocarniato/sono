<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROTOCOL · Performance Integrativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bone:#F2EFE8;
    --paper:#0E0E0D;
    --char:#161614;
    --line:#26251F;
    --mute:#78746B;
    --green:#B8D97A;
    --amber:#D9A559;
    --red:#CF5D4A;
    --blue:#7FA7C9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--bone);min-height:100vh}
  body{
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Fraunces', Georgia, serif; font-variation-settings:"opsz" 144;}
  .num{font-variant-numeric:tabular-nums}
  .tag{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .hairline{border-color:var(--line)}
  .grain{background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);background-size:3px 3px}
  .glow{text-shadow:0 0 80px rgba(184,217,122,.15)}
  .blink{animation:blink 1.4s steps(2,end) infinite}
  @keyframes blink{50%{opacity:0}}
  .reveal{opacity:0;transform:translateY(8px);animation:reveal .7s ease forwards}
  @keyframes reveal{to{opacity:1;transform:translateY(0)}}
  .d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.2s}
  .d4{animation-delay:.3s}.d5{animation-delay:.42s}.d6{animation-delay:.55s}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--paper)}
  ::-webkit-scrollbar-thumb{background:var(--line)}

  .marquee{overflow:hidden;border-top:1px solid var(--line)}
  .marquee-track{display:inline-block;white-space:nowrap;padding:8px 0;font-size:10px;letter-spacing:.3em;color:var(--mute);animation:marquee 60s linear infinite}
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  header{border-bottom:1px solid var(--line)}
  .head-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px}
  .dot{width:8px;height:8px;border-radius:999px;background:var(--green)}
  .hero{padding:48px 24px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr;gap:32px}
  @media(min-width:768px){.hero{grid-template-columns:5fr 7fr;padding:72px 40px;gap:48px}}
  .hero-score{font-size:clamp(72px,14vw,160px);line-height:.85;letter-spacing:-.03em}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px 32px;align-content:start}
  .metric{border-top:1px solid var(--line);padding:16px 12px 0 0}
  .metric-val{font-size:44px;line-height:1}
  .bar{width:100%;height:3px;background:var(--line);position:relative;margin-top:12px}
  .bar>div{height:100%;transition:width .9s ease}
  .bar-tick{position:absolute;inset:0;background-image:linear-gradient(to right, var(--line) 1px, transparent 1px);background-size:8px 100%;opacity:.3;pointer-events:none}

  section{padding:40px 24px;border-bottom:1px solid var(--line)}
  @media(min-width:768px){section{padding:48px 40px}}
  .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .h2{font-size:28px;line-height:1.1}
  @media(min-width:768px){.h2{font-size:36px}}
  .h3{font-size:22px;line-height:1.1;margin-bottom:16px}
  .range-btns{display:flex;gap:8px}
  .range-btn{border:1px solid var(--line);padding:4px 12px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);background:transparent;cursor:pointer;font-family:inherit}
  .range-btn:hover{color:var(--bone)}
  .range-btn.on{background:var(--bone);color:var(--paper)}

  .two-col{display:grid;grid-template-columns:1fr;gap:40px}
  @media(min-width:768px){.two-col{grid-template-columns:1fr 1fr}}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
  @media(min-width:768px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .kpi{border-top:1px solid var(--line);padding:16px 12px 0 0}
  .kpi-val{font-size:36px;line-height:1}

  table{width:100%;font-size:11px;border-collapse:collapse}
  th{text-align:left;padding:12px 16px 12px 0;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:400}
  td{padding:12px 16px 12px 0;border-top:1px solid var(--line)}
  .text-right{text-align:right}
  .hide-sm{display:none}
  @media(min-width:768px){.hide-sm{display:table-cell}}

  footer{border-top:1px solid var(--line);margin-top:64px}
  .foot-grid{padding:32px 24px;display:grid;grid-template-columns:1fr;gap:32px;font-size:10px;color:var(--mute);letter-spacing:.1em}
  @media(min-width:768px){.foot-grid{grid-template-columns:repeat(3,1fr);padding:32px 40px}}
  .foot-bottom{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:10px;letter-spacing:.22em;color:var(--mute)}
  @media(min-width:768px){.foot-bottom{padding:16px 40px}}

  .chart{width:100%;height:256px;position:relative}
  .chart-small{height:192px}
  svg.ch{width:100%;height:100%;display:block}

  button.retry{background:transparent;border:1px solid var(--line);color:var(--bone);padding:8px 16px;font-family:inherit;font-size:10px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;margin-top:24px}
  button.retry:hover{background:var(--char)}
</style>
</head>

if (typeof React !== "undefined" && typeof ReactDOM !== "undefined") window.__bootOk = true;

<script>
(function(){
  if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
    var msg = document.getElementById("boot-msg");
    if (msg) msg.textContent = "React falhou ao carregar";
    return;
  }
  var e = React.createElement;
  var useState = React.useState, useEffect = React.useEffect, useMemo = React.useMemo;

  var SHEET_ID  = "1hPbBeSYai8n_GpzLWLCAb1ny-4shnWlxeS4BAVdMFEc";
  var SHEET_GID = "258378049";
  var CSV_URL   = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&gid="+SHEET_GID;
  var REFRESH_MS = 5*60*1000;

  var WEIGHTS = { duration:24, efficiency:18, rhr:22, deep:11, rem:11, consistency:14 };

  function scoreDuration(min){
    if(!min) return 0;
    if(min>=420&&min<=510) return 100;
    if(min>=390&&min<420) return 80+(min-390)/30*20;
    if(min>510&&min<=570) return 100-(min-510)/60*15;
    if(min>=330&&min<390) return 50+(min-330)/60*30;
    if(min>570&&min<=640) return 85-(min-570)/70*25;
    if(min<330) return Math.max(0,min/330*60);
    return Math.max(0,65-(min-600)/60*30);
  }
  function scoreEfficiency(eff){
    if(!eff) return 0;
    if(eff>=88) return 100;
    if(eff>=85) return 80+(eff-85)/3*20;
    if(eff>=82) return 60+(eff-82)/3*20;
    if(eff>=78) return 40+(eff-78)/4*20;
    if(eff>=68) return 20+(eff-68)/10*20;
    return Math.max(0,eff/68*20);
  }
  function scoreDeep(deep,total){
    if(!deep||!total) return 0;
    var pct=deep/total*100;
    if(pct>=16&&pct<=25) return 100;
    if(pct>=13&&pct<16) return 75+(pct-13)/3*25;
    if(pct>25&&pct<=31) return 100-(pct-25)/6*20;
    if(pct>=10&&pct<14) return 45+(pct-10)/4*30;
    if(pct>33) return Math.max(40,85-(pct-33)*2);
    return Math.max(0,pct/10*45);
  }
  function scoreRem(rem,total){
    if(!rem||!total) return 0;
    var pct=rem/total*100;
    if(pct>=20&&pct<=28) return 100;
    if(pct>=17&&pct<20) return 75+(pct-17)/3*25;
    if(pct>28&&pct<=34) return 100-(pct-28)/6*15;
    if(pct>=13&&pct<18) return 45+(pct-13)/5*30;
    if(pct>35) return Math.max(40,85-(pct-35)*2);
    return Math.max(0,pct/13*45);
  }
  function scoreRhr(bpm){
    if(!bpm) return 0;
    // Calibrada: homem 30a, IMC 23.9. Normal AHA 60-80bpm.
    // <47: bradicardia possivel; <=60: excelente; 60-68: bom; 68-75: normal; >75: atencao
    if(bpm<47) return Math.max(0,80+(bpm-47)*3);
    if(bpm<=60) return 100;
    if(bpm<=68) return 100-(bpm-60)/8*20;
    if(bpm<=75) return 80-(bpm-68)/7*25;
    if(bpm<=80) return 55-(bpm-75)/5*20;
    if(bpm<=88) return 35-(bpm-80)/8*25;
    return Math.max(0,10-(bpm-88)*2);
  }
  function scoreConsistency(bedtimes){
    if(!bedtimes||bedtimes.length<3) return null;
    var mins = bedtimes.map(function(d){
      var h=d.getHours(),m=d.getMinutes(),t=h*60+m;
      if(h<12) t+=24*60;
      return t;
    });
    var avg = mins.reduce(function(a,b){return a+b;},0)/mins.length;
    var v = mins.reduce(function(a,b){return a+(b-avg)*(b-avg);},0)/mins.length;
    var std = Math.sqrt(v);
    if(std<=20) return 100;
    if(std<=40) return 85;
    if(std<=60) return 70;
    if(std<=90) return 50;
    if(std<=120) return 30;
    return Math.max(0, 30-(std-120)/4);
  }

  function parseRow(r){
    function num(v){
      if(v==null||v==="") return null;
      var n = parseFloat(String(v).replace(",","."));
      return isNaN(n)?null:n;
    }
    function pISO(s){
      if(!s) return null;
      var d = new Date(s);
      return isNaN(d.getTime())?null:d;
    }
    function get(keys){
      for(var i=0;i<keys.length;i++){
        for(var k in r){
          if(Object.prototype.hasOwnProperty.call(r,k) && k.trim().toLowerCase()===keys[i].toLowerCase())
            return r[k];
        }
      }
      return null;
    }
    return {
      dateStr: get(["Data","data"]),
      start: pISO(get(["Início","Inicio","inicio"])),
      end:   pISO(get(["Fim","fim"])),
      duration:   num(get(["Duração (min)","Duracao (min)","duracao"])),
      asleep:     num(get(["Min Dormido","min dormido"])),
      awake:      num(get(["Min Acordado","min acordado"])),
      efficiency: num(get(["Eficiência %","Eficiencia %","eficiencia"])),
      deep:       num(get(["Deep (min)","deep"])),
      light:      num(get(["Light (min)","light"])),
      rem:        num(get(["REM (min)","rem"])),
      rhr:        num(get(["BPM Repouso","bpm repouso","rhr"]))
    };
  }

  function processRows(rows){
    var byDate = {};
    rows.forEach(function(r){
      if(!r.dateStr || !r.duration) return;
      var isNap = r.duration < 180 || (r.deep===0 && r.rem===0);
      if(isNap) return;
      var prev = byDate[r.dateStr];
      if(!prev || r.duration > prev.duration) byDate[r.dateStr] = r;
    });
    var arr = [];
    for(var k in byDate) if(Object.prototype.hasOwnProperty.call(byDate,k)) arr.push(byDate[k]);
    return arr.filter(function(r){return r.start;}).sort(function(a,b){return a.start-b.start;});
  }

  function computeScore(row, history){
    var sD=scoreDuration(row.asleep);
    var sE=scoreEfficiency(row.efficiency);
    var sDp=scoreDeep(row.deep,row.asleep);
    var sR=scoreRem(row.rem,row.asleep);
    var sH=scoreRhr(row.rhr);
    var idx = -1;
    for(var i=0;i<history.length;i++) if(history[i].dateStr===row.dateStr){idx=i;break;}
    var wStart = Math.max(0, idx-6);
    var win = history.slice(wStart, idx+1).map(function(h){return h.start;}).filter(Boolean);
    var sC = scoreConsistency(win);

    function fmt(m){
      if(m==null) return "—";
      return Math.floor(m/60)+"h"+String(m%60).padStart(2,"0");
    }

    var parts = [
      {key:"duration",label:"Duração",v:sD,w:WEIGHTS.duration,raw: fmt(row.asleep)},
      {key:"efficiency",label:"Eficiência",v:sE,w:WEIGHTS.efficiency,raw: row.efficiency?row.efficiency+"%":"—"},
      {key:"deep",label:"Deep",v:sDp,w:WEIGHTS.deep,raw: (row.deep!=null&&row.asleep)?(row.deep+"m · "+(row.deep/row.asleep*100).toFixed(0)+"%"):"—"},
      {key:"rem",label:"REM",v:sR,w:WEIGHTS.rem,raw: (row.rem!=null&&row.asleep)?(row.rem+"m · "+(row.rem/row.asleep*100).toFixed(0)+"%"):"—"},
      {key:"rhr",label:"FC Repouso",v:sH,w:WEIGHTS.rhr,raw: row.rhr?(row.rhr+" bpm"):"—"},
      {key:"consistency",label:"Regularidade",v:sC,w:WEIGHTS.consistency,raw: sC!==null?"7-dia":"dados insuf."}
    ];
    var valid = parts.filter(function(p){return p.v!=null;});
    var totalW = valid.reduce(function(a,p){return a+p.w;},0);
    var total = valid.reduce(function(a,p){return a + p.v*(p.w/totalW);},0);
    return { total: Math.round(total), parts: parts };
  }

  function bandColor(v){
    if(v==null) return "var(--mute)";
    if(v>=85) return "var(--green)";
    if(v>=70) return "var(--blue)";
    if(v>=55) return "var(--amber)";
    return "var(--red)";
  }
  function bandLabel(v){
    if(v>=85) return "ÓTIMO";
    if(v>=70) return "BOM";
    if(v>=55) return "REGULAR";
    return "ABAIXO";
  }
  function fmtDate(s){
    if(!s) return "";
    var p=s.split("/"), mn=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
    return p[0]+" "+(mn[parseInt(p[1],10)-1]||"");
  }
  function fmtTime(d){
    if(!d) return "—";
    return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  }

  function LineChart(props){
    var data = props.data;
    var W=800, H=props.height||220, pad={l:40,r:20,t:20,b:30};
    if(!data.length) return null;
    var ys = data.map(function(d){return d.y;});
    var yMin = props.yMin != null ? props.yMin : Math.min.apply(null, ys);
    var yMax = props.yMax != null ? props.yMax : Math.max.apply(null, ys);
    if(yMin===yMax){yMin=yMin-1;yMax=yMax+1;}
    var xStep = (W-pad.l-pad.r) / Math.max(1, data.length-1);
    function px(i){return pad.l + i*xStep;}
    function py(y){return pad.t + (1 - (y-yMin)/(yMax-yMin)) * (H-pad.t-pad.b);}

    var pts = data.map(function(d,i){return px(i)+","+py(d.y);}).join(" ");
    var areaD = "M "+pad.l+","+py(data[0].y)+" " +
      data.map(function(d,i){return "L "+px(i)+","+py(d.y);}).join(" ") +
      " L "+px(data.length-1)+","+(H-pad.b)+" L "+pad.l+","+(H-pad.b)+" Z";

    var yTicks = props.yMax===100 ? (function(){
      var mn = props.yMin||0;
      var step = (100-mn)/4;
      return [mn, Math.round(mn+step), Math.round(mn+step*2), Math.round(mn+step*3), 100];
    })() : (function(){
      var t=[], step=(yMax-yMin)/4;
      for(var i=0;i<=4;i++) t.push(Math.round(yMin+i*step));
      return t;
    })();
    var xEvery = Math.max(1, Math.floor(data.length/7));

    var gradId = "g_"+Math.random().toString(36).slice(2,8);

    return e("div",{className:"chart"+(props.small?" chart-small":"")},
      e("svg",{className:"ch", viewBox:"0 0 "+W+" "+H, preserveAspectRatio:"none"},
        e("defs",null,
          e("linearGradient",{id:gradId, x1:"0",y1:"0",x2:"0",y2:"1"},
            e("stop",{offset:"0%",stopColor:props.color||"#B8D97A",stopOpacity:.4}),
            e("stop",{offset:"100%",stopColor:props.color||"#B8D97A",stopOpacity:0})
          )
        ),
        yTicks.map(function(t,i){
          return e("g",{key:"y"+i},
            e("line",{x1:pad.l,y1:py(t),x2:W-pad.r,y2:py(t),stroke:"#26251F"}),
            e("text",{x:pad.l-8,y:py(t)+3,fontSize:10,fill:"#78746B",textAnchor:"end"},t)
          );
        }),
        (props.refs||[]).map(function(r,i){
          return e("g",{key:"r"+i},
            e("line",{x1:pad.l,y1:py(r.y),x2:W-pad.r,y2:py(r.y),stroke:"#26251F",strokeDasharray:"2 4"}),
            r.label ? e("text",{x:W-pad.r,y:py(r.y)-4,fontSize:9,fill:"#78746B",textAnchor:"end"},r.label) : null
          );
        }),
        props.area && e("path",{d:areaD,fill:"url(#"+gradId+")"}),
        e("polyline",{points:pts,fill:"none",stroke:props.color||"#B8D97A",strokeWidth:1.5}),
        data.map(function(d,i){
          if(i%xEvery!==0) return null;
          return e("text",{key:"x"+i,x:px(i),y:H-10,fontSize:10,fill:"#78746B",textAnchor:"middle"},d.x);
        })
      )
    );
  }

  function StackedBar(props){
    var data = props.data;
    var W=800, H=192, pad={l:40,r:20,t:10,b:30};
    if(!data.length) return null;
    var max = Math.max.apply(null, data.map(function(d){return (d.deep||0)+(d.rem||0)+(d.light||0);})) || 1;
    var xStep = (W-pad.l-pad.r) / data.length;
    var bw = Math.max(1, xStep*.7);
    var xEvery = Math.max(1, Math.floor(data.length/7));

    return e("div",{className:"chart chart-small"},
      e("svg",{className:"ch",viewBox:"0 0 "+W+" "+H, preserveAspectRatio:"none"},
        [0,.25,.5,.75,1].map(function(f,i){
          var y = pad.t + (1-f)*(H-pad.t-pad.b);
          return e("line",{key:"g"+i,x1:pad.l,y1:y,x2:W-pad.r,y2:y,stroke:"#26251F"});
        }),
        data.map(function(d,i){
          var x = pad.l + i*xStep + (xStep-bw)/2;
          var y0 = H-pad.b;
          var hDeep = (d.deep||0)/max * (H-pad.t-pad.b);
          var hRem  = (d.rem ||0)/max * (H-pad.t-pad.b);
          var hLight= (d.light||0)/max * (H-pad.t-pad.b);
          return e("g",{key:"b"+i},
            e("rect",{x:x,y:y0-hLight,width:bw,height:hLight,fill:"#3D3C35"}),
            e("rect",{x:x,y:y0-hLight-hRem,width:bw,height:hRem,fill:"#7FA7C9"}),
            e("rect",{x:x,y:y0-hLight-hRem-hDeep,width:bw,height:hDeep,fill:"#B8D97A"})
          );
        }),
        data.map(function(d,i){
          if(i%xEvery!==0) return null;
          return e("text",{key:"x"+i,x:pad.l+i*xStep+xStep/2,y:H-10,fontSize:10,fill:"#78746B",textAnchor:"middle"},d.x);
        })
      )
    );
  }

  function Header(props){
    return e("header",null,
      e("div",{className:"head-bar"},
        e("div",{style:{display:"flex",alignItems:"center",gap:12}},
          e("div",{className:"dot"}),
          e("span",{className:"tag"},"PROTOCOL · v1.0")
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:24,fontSize:10,letterSpacing:".2em",color:"var(--mute)"}},
          e("span",{className:"num"},"SYNC "+(props.loading?"…":"LIVE")),
          e("span",{className:"num"}, props.lastUpdate||"—"),
          e("span",{className:"blink",style:{color:"var(--green)"}},"●")
        )
      ),
      e("div",{className:"marquee"},
        e("div",{className:"marquee-track"},
          "· PERFORMANCE INTEGRATIVA · SLEEP ARCHITECTURE · AUTONOMIC RECOVERY · CIRCADIAN ALIGNMENT · HRV PROXY · DEEP SLEEP CONSOLIDATION · REM MENTAL RESTORATION · DON'T DIE · ".repeat(3)
        )
      )
    );
  }

  function Bar100(props){
    var v = Math.max(0, Math.min(100, props.value||0));
    var barWidth = v >= 100 ? 96 : v;
    return e("div",{className:"bar"},
      e("div",{style:{width:barWidth+"%",background:bandColor(v)}}),
      e("div",{className:"bar-tick"})
    );
  }

  function MetricCard(props){
    var p = props.part, i = props.index;
    var isMax = p.v != null && Math.round(p.v) >= 100;
    return e("div",{className:"metric reveal d"+Math.min(6,i+2)},
      e("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between"}},
        e("div",{className:"tag"}, String(i+1).padStart(2,"0")+" · "+p.label),
        isMax
          ? e("div",{className:"num",style:{fontSize:11,color:bandColor(p.v),letterSpacing:".15em",borderBottom:"1px solid "+bandColor(p.v),paddingBottom:1}}, "MAX")
          : e("div",{className:"num",style:{fontSize:11,color:bandColor(p.v)}}, bandLabel(p.v))
      ),
      e("div",{style:{marginTop:12,display:"flex",alignItems:"baseline",gap:12}},
        e("div",{className:"display num metric-val"}, p.v==null?"—":Math.round(p.v)),
        e("div",{className:"num",style:{fontSize:11,color:"var(--mute)"}},"/100")
      ),
      e(Bar100,{value:p.v}),
      e("div",{style:{marginTop:8,display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--mute)"}},
        e("span",{className:"num"},p.raw),
        e("span",{className:"num"},"peso "+p.w+"%")
      )
    );
  }

  function Hero(props){
    var t = props.today, y = props.yesterday;
    var diff = y ? t.total - y.total : 0;
    var diffStr = diff===0?"—":(diff>0?"+"+diff:String(diff));
    var diffColor = diff>0?"var(--green)":diff<0?"var(--red)":"var(--mute)";
    return e("section",{className:"hero"},
      e("div",{style:{display:"flex",flexDirection:"column",justifyContent:"space-between"}},
        e("div",{className:"reveal d1"},
          e("div",{className:"tag",style:{marginBottom:8}},"ÍNDICE DE PERFORMANCE · HOJE"),
          e("h1",{className:"display num glow hero-score",style:{color:bandColor(t.total)}}, t.total),
          e("div",{style:{display:"flex",alignItems:"center",gap:16,marginTop:16}},
            e("span",{className:"tag",style:{color:bandColor(t.total)}}, bandLabel(t.total)),
            e("span",{className:"num",style:{fontSize:11,color:diffColor}}, "Δ 24H "+diffStr)
          )
        ),
        e("div",{style:{marginTop:32},className:"reveal d3"},
          e("div",{className:"tag",style:{marginBottom:8}},"REGISTRO"),
          e("div",{className:"display",style:{fontSize:20}}, t.row.dateStr),
          e("div",{className:"num",style:{fontSize:11,color:"var(--mute)",marginTop:4}},
            (t.row.start&&t.row.end)?(fmtTime(t.row.start)+" → "+fmtTime(t.row.end)):"—")
        )
      ),
      e("div",{className:"metrics"},
        t.parts.map(function(p,i){return e(MetricCard,{key:p.key,part:p,index:i});})
      )
    );
  }

  function Summary(props){
    var s = props.series;
    var s7 = s.slice(-7), s30 = s.slice(-30);
    function avg(arr){return arr.length?arr.reduce(function(a,b){return a+(b.total||0);},0)/arr.length:0;}
    var avg7 = avg(s7), avg30 = avg(s30);
    var streak = 0;
    for(var i=s.length-1;i>=0;i--){ if(s[i].total>=70) streak++; else break; }
    var best = s.slice().sort(function(a,b){return b.total-a.total;})[0];

    function KPI(label,val,unit,sub,color){
      return e("div",{className:"kpi"},
        e("div",{className:"tag"},label),
        e("div",{style:{marginTop:8,display:"flex",alignItems:"baseline",gap:8}},
          e("div",{className:"display num kpi-val",style:{color:color||"var(--bone)"}}, val),
          unit ? e("div",{className:"num",style:{fontSize:10,color:"var(--mute)"}},unit) : null
        ),
        sub ? e("div",{className:"num",style:{fontSize:10,color:"var(--mute)",marginTop:8}},sub) : null
      );
    }

    return e("div",{className:"kpis"},
      KPI("Média 7 DIAS", avg7.toFixed(0), "/100", s7.length+" registros", bandColor(avg7)),
      KPI("Média 30 DIAS", avg30.toFixed(0), "/100", s30.length+" registros", bandColor(avg30)),
      KPI("Streak ≥70", streak, "dias", "sequência atual", "var(--green)"),
      KPI("PR · melhor", best?best.total:0, "/100", best?best.dateStr:"—", "var(--green)")
    );
  }

  function Distribution(props){
    var s = props.series;
    var buckets = [
      {label:"85–100 ÓTIMO", test:function(v){return v>=85;}, color:"var(--green)"},
      {label:"70–84  BOM",   test:function(v){return v>=70&&v<85;}, color:"var(--blue)"},
      {label:"55–69  REGULAR", test:function(v){return v>=55&&v<70;}, color:"var(--amber)"},
      {label:"0–54   ABAIXO", test:function(v){return v<55;}, color:"var(--red)"}
    ];
    return e("div",null,
      buckets.map(function(b,i){
        var c = s.filter(function(x){return b.test(x.total);}).length;
        var pct = s.length?c/s.length*100:0;
        return e("div",{key:i,style:{marginBottom:12}},
          e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,letterSpacing:".22em",marginBottom:4}},
            e("span",{className:"num",style:{color:b.color}}, b.label),
            e("span",{className:"num",style:{color:"var(--mute)"}}, c+"  ·  "+pct.toFixed(0)+"%")
          ),
          e("div",{style:{height:3,background:"var(--line)"}},
            e("div",{style:{width:pct+"%",height:"100%",background:b.color,transition:"width .9s ease"}})
          )
        );
      })
    );
  }

  function Log(props){
    var rows = props.series.slice(-14).reverse();
    return e("div",{style:{borderTop:"1px solid var(--line)",overflowX:"auto"}},
      e("table",null,
        e("thead",null,
          e("tr",null,
            e("th",null,"Data"),
            e("th",{className:"hide-sm"},"Dormir"),
            e("th",{className:"text-right"},"Dur"),
            e("th",{className:"text-right"},"Ef%"),
            e("th",{className:"text-right hide-sm"},"Deep"),
            e("th",{className:"text-right hide-sm"},"REM"),
            e("th",{className:"text-right"},"FC"),
            e("th",{className:"text-right"},"Score")
          )
        ),
        e("tbody",null,
          rows.map(function(s,i){
            return e("tr",{key:i},
              e("td",{className:"num"}, s.dateStr),
              e("td",{className:"num hide-sm",style:{color:"var(--mute)"}}, s.start?fmtTime(s.start):"—"),
              e("td",{className:"num text-right"}, s.row.asleep?(Math.floor(s.row.asleep/60)+"h"+String(s.row.asleep%60).padStart(2,"0")):"—"),
              e("td",{className:"num text-right"}, s.row.efficiency!=null?s.row.efficiency:"—"),
              e("td",{className:"num text-right hide-sm"}, s.row.deep!=null?s.row.deep:"—"),
              e("td",{className:"num text-right hide-sm"}, s.row.rem!=null?s.row.rem:"—"),
              e("td",{className:"num text-right"}, s.row.rhr!=null?s.row.rhr:"—"),
              e("td",{className:"display text-right",style:{fontSize:18,color:bandColor(s.total)}}, s.total)
            );
          })
        )
      )
    );
  }

  function Footer(props){
    return e("footer",null,
      e("div",{className:"foot-grid"},
        e("div",null,
          e("div",{className:"tag",style:{color:"var(--bone)",marginBottom:8}},"MÉTODO"),
          e("p",{style:{lineHeight:1.6}},
            "Score composto 0–100 ponderando 6 vetores. Calibrado para homem 30 anos, 80kg, 1.83m (IMC 23.9). FC Repouso: curva ajustada para população geral (não-atleta), ótimo ≤60 bpm. Duração: sweet spot 7h–8h30 per NSF 2015. Deep/REM: tetos ajustados para superestimação do Fitbit Inspire 2 vs PSG. Soneca <180min descartada.")
        ),
        e("div",null,
          e("div",{className:"tag",style:{color:"var(--bone)",marginBottom:8}},"PESOS · INSPIRE 2"),
          e("ul",{className:"num",style:{listStyle:"none",lineHeight:1.8}},
            e("li",null,"DURAÇÃO — 24%"),
            e("li",null,"FC REPOUSO — 22%"),
            e("li",null,"EFICIÊNCIA — 18%"),
            e("li",null,"REGULARIDADE — 14%"),
            e("li",null,"DEEP — 11%"),
            e("li",null,"REM — 11%")
          )
        ),
        e("div",null,
          e("div",{className:"tag",style:{color:"var(--bone)",marginBottom:8}},"FONTE"),
          e("p",{style:{lineHeight:1.6}},
            "Leitura direta de Google Sheets via CSV export. Refresh automático a cada 5 min. Última sincronização: ",
            e("span",{className:"num",style:{color:"var(--bone)"}}, props.lastUpdate||"—"))
        )
      ),
      e("div",{className:"foot-bottom"},
        e("span",null,"PROTOCOL · CAIO · "+new Date().getFullYear()),
        e("span",null,"DON'T DIE.")
      )
    );
  }

  function App(){
    var s = useState([]); var rows = s[0], setRows = s[1];
    var l = useState(true); var loading = l[0], setLoading = l[1];
    var er = useState(null); var error = er[0], setError = er[1];
    var lu = useState(null); var lastUpdate = lu[0], setLastUpdate = lu[1];
    var rg = useState("30"); var range = rg[0], setRange = rg[1];

    function fetchData(){
      setLoading(true);
      var controller = new AbortController();
      var timeout = setTimeout(function(){controller.abort();}, 15000);
      fetch(CSV_URL+"&_t="+Date.now(),{signal:controller.signal})
        .then(function(res){
          clearTimeout(timeout);
          if(res.status===403||res.status===401) throw new Error("PLANILHA PRIVADA — libere 'Qualquer pessoa com o link · Leitor' no Compartilhar.");
          if(!res.ok) throw new Error("HTTP "+res.status);
          return res.text();
        })
        .then(function(text){
          if(text.trim().indexOf("<")===0||text.indexOf("<!DOCTYPE")>-1)
            throw new Error("PLANILHA PRIVADA — Google retornou HTML em vez de CSV. Libere acesso.");
          var parsed = Papa.parse(text,{header:true,skipEmptyLines:true});
          var mapped = parsed.data.map(parseRow);
          var processed = processRows(mapped);
          if(!processed.length) throw new Error("CSV lido mas sem registros válidos.");
          setRows(processed);
          var d = new Date();
          setLastUpdate(String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"));
          setError(null);
        })
        .catch(function(er){
          setError(er.name==="AbortError"?"Timeout ao ler planilha (15s)":er.message);
        })
        .then(function(){ setLoading(false); });
    }

    useEffect(function(){
      fetchData();
      var id = setInterval(fetchData, REFRESH_MS);
      return function(){clearInterval(id);};
    }, []);

    var scored = useMemo(function(){
      return rows.map(function(r){
        var s = computeScore(r, rows);
        return { total:s.total, parts:s.parts, row:r, dateStr:r.dateStr, start:r.start, rhr:r.rhr };
      });
    }, [rows]);

    var filtered = useMemo(function(){
      if(range==="all") return scored;
      return scored.slice(-parseInt(range,10));
    }, [scored, range]);

    if(loading && !rows.length){
      return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
        e("div",{style:{textAlign:"center"}},
          e("div",{className:"tag",style:{marginBottom:8}},"PROTOCOL"),
          e("div",{className:"display",style:{fontSize:36}},"Sincronizando",e("span",{className:"blink"},"_")),
          e("div",{className:"tag",style:{marginTop:8}},"LENDO GOOGLE SHEETS")
        )
      );
    }

    if(error){
      return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
        e("div",{style:{maxWidth:420}},
          e("div",{className:"tag",style:{marginBottom:8,color:"var(--red)"}},"ERRO DE SINCRONIZAÇÃO"),
          e("div",{className:"display",style:{fontSize:28,marginBottom:16}},"Não consegui ler a planilha."),
          e("p",{style:{fontSize:11,color:"var(--mute)",lineHeight:1.6}}, error),
          e("button",{className:"retry",onClick:fetchData},"TENTAR NOVAMENTE")
        )
      );
    }

    if(!scored.length) return null;
    var today = scored[scored.length-1];
    var yesterday = scored[scored.length-2];

    var trendData = filtered.map(function(x){return {x:fmtDate(x.dateStr), y:x.total};});
    var rhrData   = filtered.map(function(x){return {x:fmtDate(x.dateStr), y:x.rhr||0};});
    var stackData = filtered.map(function(x){return {x:fmtDate(x.dateStr), deep:x.row.deep||0, rem:x.row.rem||0, light:x.row.light||0};});

    return e("div",{className:"grain"},
      e(Header,{lastUpdate:lastUpdate, loading:loading}),
      e(Hero,{today:today, yesterday:yesterday}),

      e("section",null,
        e("div",{className:"section-head"},
          e("div",null,
            e("div",{className:"tag",style:{marginBottom:4}},"SÉRIE TEMPORAL · ÍNDICE"),
            e("h2",{className:"display h2"},"Trajetória")
          ),
          e("div",{className:"range-btns"},
            ["30","90","all"].map(function(r){
              return e("button",{key:r,className:"range-btn"+(range===r?" on":""),onClick:function(){setRange(r);}},
                r==="all"?"TUDO":r+"D");
            })
          )
        ),
        e(LineChart,{data:trendData, yMin:30, yMax:100, area:true, color:"#B8D97A", refs:[{y:85,label:"ÓTIMO"},{y:70,label:""}]})
      ),

      e("section",null,
        e("div",{className:"two-col"},
          e("div",null,
            e("div",{className:"tag",style:{marginBottom:4}},"ARQUITETURA DO SONO"),
            e("h3",{className:"display h3"},"Deep · REM · Light"),
            e(StackedBar,{data:stackData}),
            e("div",{style:{marginTop:12,display:"flex",gap:16,fontSize:10,letterSpacing:".2em"}},
              e("span",{style:{display:"flex",alignItems:"center",gap:6}}, e("span",{style:{width:12,height:2,background:"#B8D97A"}}),"DEEP"),
              e("span",{style:{display:"flex",alignItems:"center",gap:6}}, e("span",{style:{width:12,height:2,background:"#7FA7C9"}}),"REM"),
              e("span",{style:{display:"flex",alignItems:"center",gap:6}}, e("span",{style:{width:12,height:2,background:"#3D3C35"}}),"LIGHT")
            )
          ),
          e("div",null,
            e("div",{className:"tag",style:{marginBottom:4}},"RECUPERAÇÃO AUTONÔMICA"),
            e("h3",{className:"display h3"},"FC Repouso"),
            e(LineChart,{data:rhrData, small:true, color:"#7FA7C9"}),
            e("p",{style:{fontSize:11,color:"var(--mute)",marginTop:12,lineHeight:1.6}},
              "Frequência cardíaca de repouso é proxy de recuperação do sistema nervoso autônomo. Tendência descendente indica adaptação + condicionamento.")
          )
        )
      ),

      e("section",null,
        e("div",{className:"tag",style:{marginBottom:16}},"RESUMO"),
        e(Summary,{series:filtered})
      ),

      e("section",null,
        e("div",{className:"two-col"},
          e("div",null,
            e("div",{className:"tag",style:{marginBottom:4}},"DISTRIBUIÇÃO"),
            e("h3",{className:"display h3"},"Bandas de performance · "+filtered.length+" dias"),
            e(Distribution,{series:filtered})
          ),
          e("div",null,
            e("div",{className:"tag",style:{marginBottom:4}},"ÚLTIMOS 14 DIAS"),
            e("h3",{className:"display h3"},"Log"),
            e(Log,{series:filtered})
          )
        )
      ),

      e(Footer,{lastUpdate:lastUpdate})
    );
  }

  var rootEl = document.getElementById("root");
  rootEl.innerHTML = "";
  ReactDOM.createRoot(rootEl).render(e(App));
})();
</script>

</body>
</html>
